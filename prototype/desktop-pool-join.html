<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CardMind — 加入数据池</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="desktop-styles.css" rel="stylesheet"/>
<style>
  .join-form-container {
    max-width: 480px;
    width: 100%;
  }
  .join-form-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: var(--unit-6);
  }
  .join-form-title .material-symbols-outlined {
    font-size: 32px;
    color: var(--active-teal);
  }
  .invite-code-input {
    width: 100%;
    padding: 12px 16px;
    font-family: var(--font-mono);
    font-size: 18px;
    letter-spacing: 0.1em;
    color: var(--ink-charcoal);
    background: var(--surface-container-lowest);
    border: 1px solid var(--muted-border);
    border-bottom: 2px solid var(--muted-border);
    border-radius: var(--radius) var(--radius) 0 0;
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
  }
  .invite-code-input:focus {
    border-bottom-color: var(--active-teal);
  }
  .invite-code-input::placeholder {
    color: var(--muted-border);
    letter-spacing: 0.05em;
    font-size: 15px;
  }
  .join-hint {
    font-size: 12px;
    color: var(--graphite-gray);
    margin-top: 8px;
    text-align: center;
  }
  .divider-label {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: var(--unit-6) 0;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--graphite-gray);
  }
  .divider-label::before,
  .divider-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--muted-border);
  }
</style>
</head>
<body>
<div class="app-layout">

  <!-- Pane 1: Sidebar -->
  <nav class="sidebar">
    <div>
      <div class="sidebar-header">
        <div class="sidebar-logo">C</div>
        <div>
          <div class="sidebar-title">CardMind</div>
          <div class="sidebar-subtitle">本地优先工作区</div>
        </div>
      </div>
      <div class="sidebar-cta">
        <a href="desktop-note-new.html" class="btn-new-note" style="text-decoration:none;">
          <span class="material-symbols-outlined" style="font-size:18px;">add</span>
          新建卡片
        </a>
      </div>
      <ul class="sidebar-nav">
        <li><a href="desktop-notes-list.html" class="nav-item">
          <span class="material-symbols-outlined">folder_open</span>卡片
        </a></li>
        <li><a href="desktop-pool-setup.html" class="nav-item active">
          <span class="material-symbols-outlined">database</span>数据池
        </a></li>
      </ul>
    </div>
    <div class="sidebar-footer">
      <a href="desktop-sync-error.html" class="sync-status" style="text-decoration:none;">
        <span class="material-symbols-outlined">sync</span>已同步
      </a>
    </div>
  </nav>

  <!-- Pane 2: Pool List (Setup context) -->
  <aside class="list-pane">
    <div class="list-header">
      <h2 class="list-title">设置数据池</h2>
      <div class="list-search">
        <span class="material-symbols-outlined">search</span>
        <input placeholder="搜索数据池..." type="text"/>
      </div>
    </div>
    <div class="list-body" style="align-items:center;justify-content:center;">
      <div style="text-align:center;color:var(--graphite-gray);font-size:12px;">
        当前没有已加入的数据池
      </div>
    </div>
  </aside>

  <!-- Pane 3: Join Pool Form -->
  <main class="editor-pane" style="align-items:center;justify-content:center;">
    <div class="join-form-container" style="padding:24px;">
      <div class="join-form-title">
        <span class="material-symbols-outlined">login</span>
        <h1 class="display-lg">加入数据池</h1>
      </div>

      <p style="font-size:14px;color:var(--graphite-gray);margin-bottom:24px;line-height:1.6;">
        输入其他设备或团队成员分享给您的邀请码，即可加入已有数据池并开始同步卡片。
      </p>

      <div class="form-group">
        <label class="form-label" for="invite-code">邀请码</label>
        <input id="invite-code" class="invite-code-input" type="text" placeholder="XXXX-XXXX-XXXX" maxlength="14" autocomplete="off"/>
        <div class="join-hint">格式：4位字符-4位字符-4位字符</div>
      </div>

      <div style="display:flex;gap:8px;margin-top:24px;">
        <a href="desktop-pool-setup.html" class="btn-ghost" style="flex:1;text-align:center;text-decoration:none;">取消</a>
        <a href="desktop-pool-joined.html" class="btn-primary" style="flex:1;text-align:center;text-decoration:none;">确认加入</a>
      </div>

      <div class="divider-label">或通过本地网络</div>

      <p style="font-size:13px;color:var(--graphite-gray);margin-bottom:16px;line-height:1.5;">
        CardMind 支持通过本地网络自动发现附近的设备。请确保两台设备连接在同一网络下。
      </p>

      <button class="btn-secondary" style="width:100%;">
        <span class="material-symbols-outlined" style="font-size:18px;margin-right:8px;">wifi_find</span>
        扫描本地网络
      </button>

      <div style="margin-top:16px;padding:12px;background:var(--surface-container-low);border-radius:var(--radius);font-size:12px;color:var(--graphite-gray);display:flex;align-items:flex-start;gap:8px;">
        <span class="material-symbols-outlined" style="font-size:16px;color:var(--active-teal);flex-shrink:0;margin-top:1px;">info</span>
        <span>加入数据池需要先设置应用锁以保护您的数据安全。如尚未设置，系统将引导您完成配置。</span>
      </div>
    </div>
  </main>
</div>

<script>
  // Auto-format invite code with dashes
  const input = document.getElementById('invite-code');
  input.addEventListener('input', function(e) {
    let val = this.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
    if (val.length > 4) val = val.slice(0,4) + '-' + val.slice(4);
    if (val.length > 9) val = val.slice(0,9) + '-' + val.slice(9,13);
    this.value = val.slice(0,14);
  });
</script>
</body>
</html>
