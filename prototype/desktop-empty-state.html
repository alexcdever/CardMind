<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CardMind — 空态</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="desktop-styles.css" rel="stylesheet"/>
<style>
  .empty-state-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 48px 24px;
    gap: 0;
  }
  .empty-illustration {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: var(--surface-container-low);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
  }
  .empty-illustration .material-symbols-outlined {
    font-size: 56px;
    color: var(--active-teal);
    font-variation-settings: 'FILL' 0, 'wght' 200;
  }
  .empty-heading {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--ink-charcoal);
    margin-bottom: 8px;
  }
  .empty-desc {
    font-size: 15px;
    color: var(--graphite-gray);
    max-width: 360px;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .empty-actions {
    display: flex;
    gap: 12px;
  }
  .empty-tip {
    margin-top: 48px;
    font-size: 12px;
    color: var(--graphite-gray);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .empty-tip .material-symbols-outlined {
    font-size: 16px;
  }
</style>
</head>
<body>
<div class="app-layout">

  <!-- Pane 1: Sidebar -->
  <nav class="sidebar">
    <div>
      <div class="sidebar-header">
        <div class="sidebar-logo">C</div>
        <div>
          <div class="sidebar-title">CardMind</div>
        </div>
      </div>
      <div class="sidebar-cta">
        <a class="btn-new-note" href="desktop-note-new.html" style="text-decoration:none;width:100%;display:flex;align-items:center;gap:8px;justify-content:center;">
          <span class="material-symbols-outlined" style="font-size:18px;">add</span>
          新建卡片
        </a>
      </div>
      <ul class="sidebar-nav">
        <li><a href="desktop-notes-list.html" class="nav-item active">
          <span class="material-symbols-outlined">folder_open</span>卡片
        </a></li>
        <li><a href="desktop-pool-setup.html" class="nav-item">
          <span class="material-symbols-outlined">database</span>数据池
        </a></li>
      </ul>
    </div>
    <div class="sidebar-footer">
      <a href="desktop-sync-error.html" class="sync-status" style="text-decoration:none;">
        <span class="material-symbols-outlined">sync</span>已同步
      </a>
    </div>
  </nav>

  <!-- Pane 2: Note List -->
  <aside class="list-pane">
    <div class="list-header">
      <div class="list-header-top">
        <h2 class="list-title">卡片</h2>
      </div>
      <div class="list-search">
        <span class="material-symbols-outlined">search</span>
        <input placeholder="搜索卡片..." type="text"/>
      </div>
    </div>
    <div class="list-body no-scrollbar" style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--graphite-gray);font-size:13px;">
      <span class="material-symbols-outlined" style="font-size:36px;opacity:0.4;">inbox</span>
      <span style="opacity:0.6;">还没有卡片</span>
    </div>
  </aside>

  <!-- Pane 3: Editor / Empty State -->
  <main class="editor-pane no-scrollbar">
    <div class="empty-state-page">
      <div class="empty-illustration">
        <span class="material-symbols-outlined">stylus_note</span>
      </div>
      <h1 class="empty-heading">还没有卡片</h1>
      <p class="empty-desc">
        CardMind 是您的本地优先笔记空间。创建您的第一张卡片，开始记录想法、会议和灵感。
      </p>
      <div class="empty-actions">
        <a href="desktop-note-new.html" class="btn-primary" style="text-decoration:none;display:flex;align-items:center;gap:8px;padding:10px 24px;font-size:15px;">
          <span class="material-symbols-outlined" style="font-size:18px;">add</span>
          新建卡片
        </a>
      </div>
      <div class="empty-tip">
        <span class="material-symbols-outlined">lightbulb</span>
        提示：使用快捷键 <code style="font-family:var(--font-mono);background:var(--surface-container-low);padding:2px 6px;border-radius:3px;font-size:11px;">⌘N</code> 快速新建卡片
      </div>
    </div>
  </main>

</div>
</body>
</html>
